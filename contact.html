<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Explore Dhule City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#f4f4f4,#ffe6cc);
}

header{
    background: linear-gradient(to right,#ff9933,#ff6600);
    color:white;
    padding:25px;
    text-align:center;
}

.contact-section{
    padding:50px 20px;
    text-align:center;
}

.contact-section h2{
    color:#ff6600;
}

/* Contact form box */
.contact-box{
    max-width:420px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Input fields */
input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    background:#ff6600;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

/* Color change when mouse touches button */
button:hover{
    background:#ff9933;
    color:black;
    transform:scale(1.05);
}

/* Contact info */
.info{
    margin-top:25px;
    font-size:15px;
    color:#333;
}

.info p{
    margin:6px 0;
}


</style>
</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<section class="contact-section">

<h2>Get in Touch</h2>

<div class="contact-box">

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="4" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

<div class="info">
<p><strong>📌 Location:</strong> Dhule, Maharashtra</p>
<p><strong>📧 Email:</strong> exploredhule@gmail.com</p>
<p><strong>📞 Phone:</strong> +91 9876543210</p>
</div>

</section>

</body>
</html>
