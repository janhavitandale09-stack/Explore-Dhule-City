<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explore Dhule City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background-image:url("https://thumbs.dreamstime.com/b/panzra-river-sunset-dhule-maharashtra-beautiful-pic-magic-nature-273429348.jpg");
background-repeat: no-repeat;
background-size: cover;
background-position: center;
}

/* Header */
header{
background: linear-gradient(to right,#ff9933, #ff6600);
color:#333;
padding:20px;
text-align:center;
}

header h1{
font-size:50px;
}

/* Navbar */
nav{
background:#607d8b;
padding:12px;
text-align:center;
flex-wrap:wrap;              /* ✅ allow wrapping */
}

nav a{
color:white;
text-decoration:none;
margin:8px 10px;
font-size:18px;
display:inline-block;
}

nav a:hover{
color:#ffd54f;
}

/* Hero Section */
.hero{
min-height:80vh;             /* ✅ better than fixed height */
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-box{
background:rgba(255,255,255,0.75);
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
max-width:90%;               /* ✅ prevent overflow */
}

.hero h1{
font-size:120px;
margin-bottom:10px;
color:#37474f;
}

.hero h2{
font-size:36px;
margin-bottom:10px;
color:#6a1b9a;
}

.hero p{
font-size:20px;
max-width:650px;
margin:auto;
color:#444;
}

/* Footer */
footer{
background:#607d8b;
color:white;
text-align:center;
padding:20px;
}

/* 📱 Mobile */
@media (max-width:600px){

header h1{
font-size:28px;
}

nav a{
font-size:14px;
margin:6px;
}

.hero h1{
font-size:40px;           /* 🔥 major fix */
}

.hero h2{
font-size:20px;
}

.hero p{
font-size:14px;
}

.hero-box{
padding:20px;
}
}

/* 📱 Tablet */
@media (min-width:601px) and (max-width:1024px){

.hero h1{
font-size:70px;
}

.hero h2{
font-size:28px;
}

.hero p{
font-size:18px;
}
}

/* 💻 Desktop */
@media (min-width:1025px){

.hero h1{
font-size:120px;
}

}

</style>
</head>

<body>

<header>
<h1>Explore Dhule City</h1>
<p>Discover Culture, History & Nature</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="attractions.html">Attractions</a>
<a href="food.html">Food</a>
<a href="culture.html">Culture</a>
<a href="transportation.html">Transportation</a>
<a href="stay.html">Stay</a>
<a href="shopping.html">Shopping</a>
<a href="emergency.html">Emergency</a>
<a href="contact.html">Contact</a>
</nav>

<div class="hero">
<div class="hero-box">
<h1><u>Welcome to Dhule</u></h1>
<h2>The Heart of Khandesh ❤️</h2>
<p>The heart of North Maharashtra filled with tradition, heritage, and progress.</p>
</div>
</div>

<footer>
© 2026 Explore Dhule
</footer>

</body>
</html>
